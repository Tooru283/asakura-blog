ss="relative z-10 text-lg text-[var(--text-color)]" data-icon="fa6-solid:arrow-up">   <symbol id="ai:fa6-solid:arrow-up" viewBox="0 0 384 512"><path fill="currentColor" d="M214.6 41.4c-12.5-12.5-32.8-12.5-45.3 0l-160 160c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L160 141.2V448c0 17.7 14.3 32 32 32s32-14.3 32-32V141.3l105.4 105.3c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-160-160z"/></symbol><use href="#ai:fa6-solid:arrow-up"></use>  </svg> </button>  <button id="backBottom" title="Back to Bottom" class="w-10 h-10 rounded-full border border-[var(--text-color)]/20 cursor-pointer flex items-center justify-center transition-transform duration-200 active:scale-90 shadow-none backdrop-blur bg-[var(--bg-color)]/20 hover:bg-[var(--button-hover-color)]"> <svg width="0.75em" height="1em" class="text-lg text-[var(--text-color)]" data-icon="fa6-solid:arrow-down">   <symbol id="ai:fa6-solid:arrow-down" viewBox="0 0 384 512"><path fill="currentColor" d="M169.4 470.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 370.8V64c0-17.7-14.3-32-32-32s-32 14.3-32 32v306.7L54.6 265.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z"/></symbol><use href="#ai:fa6-solid:arrow-down"></use>  </svg> </button>  </div> <button id="menuTrigger" title="Menu" class="w-full h-full rounded-full border border-[var(--text-color)]/20 cursor-pointer flex items-center justify-center transition-all duration-300 shadow-none backdrop-blur bg-[var(--bg-color)]/20 active:scale-95 hover:bg-[var(--button-hover-color)]"> <svg width="0.88em" height="1em" class="absolute text-lg text-[var(--text-color)] transition-all duration-300 opacity-100 rotate-0 [.is-active_&#38;]:opacity-0 [.is-active_&#38;]:rotate-90" data-icon="fa6-solid:ellipsis">   <symbol id="ai:fa6-solid:ellipsis" viewBox="0 0 448 512"><path fill="currentColor" d="M8 256a56 56 0 1 1 112 0a56 56 0 1 1-112 0m160 0a56 56 0 1 1 112 0a56 56 0 1 1-112 0m216-56a56 56 0 1 1 0 112a56 56 0 1 1 0-112"/></symbol><use href="#ai:fa6-solid:ellipsis"></use>  </svg> <svg width="0.75em" height="1em" viewBox="0 0 384 512" class="absolute text-lg text-[var(--text-color)] transition-all duration-300 opacity-0 -rotate-90 [.is-active_&#38;]:opacity-100 [.is-active_&#38;]:rotate-0" data-icon="fa6-solid:xmark">   <use href="#ai:fa6-solid:xmark"></use>  </svg> </button>  </div> <script>
function initFabMenu() {
  const container = document.getElementById('fabMenu');
  const trigger = document.getElementById('menuTrigger');
  const backTop = document.getElementById('backTop');
  const backBottom = document.getElementById('backBottom');
  const backComment = document.getElementById('backComment');
  const progressCircle = document.getElementById('progress-circle');
  const tocTrigger = document.getElementById('tocTrigger');
  const closeToc = document.getElementById('closeToc');
  const tocLinks = document.querySelectorAll('.toc-link');
  
  if (!container || !trigger) return;

  const threshold = parseInt(container.dataset.scrollDistance) || 100;
  let isTocOpen = false;
  let scrollPosOnTocOpen = 0;

  const handleScroll = () => {
    const scrollTop = window.scrollY || document.documentElement.scrollTop;
    const docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    
    // 控制 FAB 整体显示/隐藏
    if (scrollTop > threshold) {
      container.classList.remove('opacity-0', 'pointer-events-none');
      container.classList.add('opacity-100', 'pointer-events-auto');
    } else {
      container.classList.add('opacity-0', 'pointer-events-none');
      container.classList.remove('opacity-100', 'pointer-events-auto', 'is-active', 'toc-active');
      isTocOpen = false; // 回到顶部时同时关闭目录状态
    }

    // 滑动页面时平滑关闭目录 (设置 50px 的缓冲阈值，防止误触)
    if (isTocOpen && Math.abs(scrollTop - scrollPosOnTocOpen) > 50) {
      isTocOpen = false;
      container.classList.remove('toc-active');
    }

    // 更新进度条
    if (progressCircle && docHeight > 0) {
      const scrollPercent = Math.min(100, (scrollTop / docHeight) * 100);
      const circumference = 2 * Math.PI * 20;
      const offset = circumference - (scrollPercent / 100) * circumference;
      progressCircle.style.strokeDasharray = `${circumference - offset} ${offset}`;
    }
  };

  // 主按钮切换
  trigger.onclick = (e) => {
    e.stopPropagation();
    container.classList.toggle('is-active');
    // 如果关闭了主菜单，也一并关闭目录
    if (!container.classList.contains('is-active')) {
      isTocOpen = false;
      container.classList.remove('toc-active');
    }
  };

  // 目录按钮触发
  if (tocTrigger) {
    tocTrigger.onclick = (e) => {
      e.stopPropagation();
      isTocOpen = !isTocOpen;
      container.classList.toggle('toc-active', isTocOpen);
      // 记录打开目录时的滚动位置
      if (isTocOpen) {
        scrollPosOnTocOpen = window.scrollY || document.documentElement.scrollTop;
      }
    };
  }

  // 关闭目录按钮
  if (closeToc) {
    closeToc.onclick = (e) => {
      e.stopPropagation();
      isTocOpen = false;
      container.classList.remove('toc-active');
    };
  }

tocLinks.forEach(link => {
    link.onclick = (e) => {
      e.preventDefault(); // 阻止默认的锚点跳转，以便使用平滑滚动
      
      // 点击即时反馈：移除所有高亮，给当前点击的项加上高亮
      tocLinks.forEach(l => l.classList.remove('is-active'));
      link.classList.add('is-active');

      const targetId = link.getAttribute('href').substring(1);
      const targetElement = document.getElementById(targetId);
      
      if (targetElement) {
        // 考虑到可能有顶部导航栏，预留一点偏移量（可选，比如 60px）
        const offset = 60; 
        const bodyRect = document.body.getBoundingClientRect().top;
        const elementRect = targetElement.getBoundingClientRect().top;
        const elementPosition = elementRect - bodyRect;
        const offsetPosition = elementPosition - offset;

        window.scrollTo({
          top: offsetPosition,
          behavior: 'smooth'
        });
        
        // 缩起目录面板
        isTocOpen = false;
        container.classList.remove('toc-active');
      }
    };
  });

  // 提取所有正文里的标题元素
  const headingElements = Array.from(tocLinks)
    .map(link => document.getElementById(link.getAttribute('href').substring(1)))
    .filter(Boolean); // 过滤掉不存在的元素

  if (headingElements.length > 0) {
    // 设置观察器参数：当标题进入视窗顶部向下 10% 到 20% 的区域时触发
    const observerOptions = {
      root: null,
      rootMargin: '-10% 0px -80% 0px', 
      threshold: 0
    };

    const tocObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          // 清除所有高亮
          tocLinks.forEach(l => l.classList.remove('is-active'));
          // 找到当前对应的目录链接并高亮
          const activeId = entry.target.id;
          const activeLink = document.querySelector(`.toc-link[href="#${activeId}"]`);
          if (activeLink) {
            activeLink.classList.add('is-active');
            // activeLink.scrollIntoView({ block: 'nearest' });
          }
        }
      });
    }, observerOptions);

    // 开始观察所有标题
    headingElements.forEach(el => tocObserver.observe(el));
  }

  // 回到顶部
  if (backTop) {
    backTop.onclick = () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      container.classList.remove('is-active', 'toc-active');
      isTocOpen = false;
    };
  }

  // 回到底部
  if (backBottom) {
    backBottom.onclick = () => {
      window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
      container.classList.remove('is-active', 'toc-active');
      isTocOpen = false;
    };
  }

  // 回到评论区
  if (backComment) {
    backComment.onclick = () => {
      const comments = document.getElementById('comments');
      comments.scrollIntoView({ behavior: 'smooth' });
      container.classList.remove('is-active', 'toc-active');
      isTocOpen = false;
    };
  }

  // 点击外部关闭所有展开项
  document.addEventListener('click', (e) => {
    if (!container.contains(e.target)) {
      container.classList.remove('is-active', 'toc-active');
      isTocOpen = false;
    }
  });

  window.addEventListener('scroll', handleScroll, { passive: true });
  handleScroll();
}

document.addEventListener('astro:page-load', initFabMenu);
