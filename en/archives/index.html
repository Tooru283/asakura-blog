,&quot;rainbow-text&quot;],&quot;text&quot;:[0,&quot;Rainbow Text&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;nested-effect&quot;],&quot;text&quot;:[0,&quot;Nested Effect&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;typst-testing&quot;],&quot;text&quot;:[0,&quot;Typst Testing&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;alert-component-testing&quot;],&quot;text&quot;:[0,&quot;Alert Component Testing&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;single-line-content-testing&quot;],&quot;text&quot;:[0,&quot;Single-Line Content Testing&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;multi-line-content-testing&quot;],&quot;text&quot;:[0,&quot;Multi-Line Content Testing&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;nested-content-testing&quot;],&quot;text&quot;:[0,&quot;Nested Content Testing&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;custom-header-test&quot;],&quot;text&quot;:[0,&quot;Custom Header Test&quot;]}]]],&quot;localImagePaths&quot;:[1,[]],&quot;remoteImagePaths&quot;:[1,[]],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;Testing Special Markdown&quot;],&quot;pubDate&quot;:[3,&quot;2026-01-12T00:00:00.000Z&quot;],&quot;description&quot;:[0,&quot;Article functionality test&quot;],&quot;category&quot;:[0,&quot;Test&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;draft&quot;:[0,false],&quot;slugId&quot;:[0,&quot;momo/test/special&quot;],&quot;minutes&quot;:[0,2],&quot;words&quot;:[0,474]}],&quot;imagePaths&quot;:[1,[]]}]}],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;isFallback&quot;:[0,false]}],[0,{&quot;id&quot;:[0,&quot;intro/comment&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Deploying a Comment System&quot;],&quot;pubDate&quot;:[3,&quot;2026-01-08T00:00:00.000Z&quot;],&quot;draft&quot;:[0,false],&quot;description&quot;:[0,&quot;Website Configuration&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;slugId&quot;:[0,&quot;momo/intro/comment&quot;],&quot;category&quot;:[0,&quot;Instruction&quot;]}],&quot;body&quot;:[0,&quot;Momo supports adding comment functionality and offers two deployment methods, including serverless deployment. For details, visit the repository [Momo-backend](https://github.com/Motues/Momo-Backend).\n\n::github{repo=\&quot;Motues/Momo-Backend\&quot;}\n\n## Configuration\n\nTo enable comments, first deploy the backend comment system as detailed in the Momo-backend repository.\n\nAfter deployment, set `comments.enable` to `true` in `src/config.ts` and specify `comments.backendUrl` with the backend URL to activate comments.\n\n## Operation\n\nThe comment component is written in Svelte. Similar to most comment systems, users must enter a nickname and email address (for notifications) to post comments. They may optionally provide a website URL.\n\n## Custom Frontend\n\nIf you need to use the comment feature in other projects, you can directly import it via CDN. The usage method is as follows. For details, please refer to the repository [Momo-backend](https://github.com/Motues/Momo-Backend).\n\n```html\n&lt;div id=\&quot;momo-comment\&quot;&gt;&lt;/div&gt;\n&lt;script src=\&quot;https://cdn.jsdelivr.net/npm/@motues/momo-comment/dist/momo-comment.min.js\&quot;&gt;&lt;/script&gt;\n&lt;script&gt;\n    momo.init({\n        el: &#39;#momo-comment&#39;, // Comment container ID\n        title: &#39;Test&#39;, // Article title\n        slugId: &#39;blog/test&#39;, // Unique slugId of the article\n        lang: &#39;zh-cn&#39;, // Language, currently supports zh-cn, en\n        apiUrl: &#39;https://api-momo.motues.top&#39; // Backend address\n    });\n&lt;/script&gt;\n```\n\n&gt; We recommend using version numbers to lock the version to avoid conflicts caused by updates.\n\nThe comment system also provides a backend management interface supporting comment moderation and deletion.\n\n## Custom Styles\n\nCurrently, you can modify the colors of the comment component; custom style features will be released in the future. Colors are modified by setting global variables, and dark mode is supported.\n\n```css\n:root {\n    --momo-text-color: #d51111;            /* Text color */\n    --momo-button-border-color: #e5e5e5;   /* Button border color */\n    --momo-button-hover-bg-color: #f5f5f5; /* Button background color (hover state) */\n    --momo-link-color: #003b6e;            /* Link color */\n}\n/* Dark mode */\n[data-theme=“dark”] { \n    - -momo-text-color: #3ad8d8;\n    --momo-button-border-color: #2e2e2e;\n    --momo-button-hover-bg-color: #3c3c3c;\n    --momo-link-color: #fff;\n}\n```&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/intro/comment/en.md&quot;],&quot;digest&quot;:[0,&quot;27ead4d3e8c3dbb5&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;p&gt;Momo supports adding comment functionality and offers two deployment methods, including serverless deployment. For details, visit the repository &lt;a href=\&quot;https://github.com/Motues/Momo-Backend\&quot;&gt;Momo-backend&lt;/a&gt;.&lt;/p&gt;\n&lt;a id=\&quot;GC12gvj9-card\&quot; class=\&quot;card-github fetch-waiting no-styling\&quot; href=\&quot;https://github.com/Motues/Momo-Backend\&quot; target=\&quot;_blank\&quot; data-repo=\&quot;Motues/Momo-Backend\&quot;&gt;&lt;div class=\&quot;gc-titlebar\&quot;&gt;&lt;div class=\&quot;gc-titlebar-left\&quot;&gt;&lt;div class=\&quot;gc-owner\&quot;&gt;&lt;div id=\&quot;GC12gvj9-avatar\&quot; class=\&quot;gc-avatar\&quot;&gt;&lt;/div&gt;&lt;div class=\&quot;gc-user\&quot;&gt;Motues&lt;/div&gt;&lt;/div&gt;&lt;div class=\&quot;gc-divider\&quot;&gt;/&lt;/div&gt;&lt;div class=\&quot;gc-repo\&quot;&gt;Momo-Backend&lt;/div&gt;&lt;/div&gt;&lt;div class=\&quot;github-logo\&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div id=\&quot;GC12gvj9-description\&quot; class=\&quot;gc-description\&quot;&gt;Waiting for api.github.com...&lt;/div&gt;&lt;div class=\&quot;gc-infobar\&quot;&gt;&lt;div id=\&quot;GC12gvj9-stars\&quot; class=\&quot;gc-stars\&quot;&gt;00K&lt;/div&gt;&lt;div id=\&quot;GC12gvj9-forks\&quot; class=\&quot;gc-forks\&quot;&gt;0K&lt;/div&gt;&lt;div id=\&quot;GC12gvj9-license\&quot; class=\&quot;gc-license\&quot;&gt;0K&lt;/div&gt;&lt;span id=\&quot;GC12gvj9-language\&quot; class=\&quot;gc-language\&quot;&gt;Waiting...&lt;/span&gt;&lt;/div&gt;&lt;script id=\&quot;GC12gvj9-script\&quot; type=\&quot;text/javascript\&quot;&gt;\n        (function() {\n            const fetchCardData = () =&gt; {\n                const card = document.getElementById(&#39;GC12gvj9-card&#39;);\n                // 如果找不到卡片，或者卡片已经加载过数据，则跳过\n                if (!card || card.dataset.loaded === \&quot;true\&quot;) return;\n\n                fetch(&#39;https://api.github.com/repos/Motues/Momo-Backend&#39;, { referrerPolicy: \&quot;no-referrer\&quot; })\n                    .then(response =&gt; response.json())\n                    .then(data =&gt; {\n                        if (data.message === \&quot;Not Found\&quot;) throw new Error(\&quot;Repo not found\&quot;);\n                        \n                        document.getElementById(&#39;GC12gvj9-description&#39;).innerText = data.description?.replace(/:[a-zA-Z0-9_]+:/g, &#39;&#39;) || \&quot;Description not set\&quot;;\n                        document.getElementById(&#39;GC12gvj9-language&#39;).innerText = data.language || \&quot;Unknown\&quot;;\n                        \n                        const fmt = Intl.NumberFormat(&#39;en-us&#39;, { notation: \&quot;compact\&quot;, maximumFractionDigits: 1 });\n                        document.getElementById(&#39;GC12gvj9-forks&#39;).innerText = fmt.format(data.forks).replaceAll(\&quot; \&quot;, &#39;&#39;);\n                        document.getElementById(&#39;GC12gvj9-stars&#39;).innerText = fmt.format(data.stargazers_count).replaceAll(\&quot; \&quot;, &#39;&#39;);\n                        document.getElementById(&#39;GC12gvj9-license&#39;).innerText = data.license?.spdx_id || \&quot;No License\&quot;;\n\n                        const avatarEl = document.getElementById(&#39;GC12gvj9-avatar&#39;);\n                        avatarEl.style.backgroundImage = &#39;url(&#39; + data.owner.avatar_url + &#39;)&#39;;\n                        avatarEl.style.backgroundColor = &#39;transparent&#39;;\n\n                        card.classList.remove(\&quot;fetch-waiting\&quot;);\n                        card.dataset.loaded = \&quot;true\&quot;; // 标记加载完成\n                        console.log(\&quot;[GITHUB-CARD] Successfully loaded: Motues/Momo-Backend\&quot;);\n                    })\n                    .catch(err =&gt; {\n                        const c = document.getElementById(&#39;GC12gvj9-card&#39;);\n                        c?.classList.add(\&quot;fetch-error\&quot;);\n                        console.warn(\&quot;[GITHUB-CARD] Error loading Motues/Momo-Backend:\&quot;, err);\n                    });\n            };\n\n            fetchCardData();\n            document.addEventListener(&#39;astro:page-load&#39;, fetchCardData);\n        })();\n        &lt;/script&gt;&lt;/a&gt;\n&lt;h2 id=\&quot;configuration\&quot;&gt;Configuration&lt;/h2&gt;\n&lt;p&gt;To enable comments, first deploy the backend comment system as detailed in the Momo-backend repository.&lt;/p&gt;\n&lt;p&gt;After deployment, set &lt;code&gt;comments.enable&lt;/code&gt; to &lt;code&gt;true&lt;/code&gt; in &lt;code&gt;src/config.ts&lt;/code&gt; and specify &lt;code&gt;comments.backendUrl&lt;/code&gt; with the backend URL to activate comments.&lt;/p&gt;\n&lt;h2 id=\&quot;operation\&quot;&gt;Operation&lt;/h2&gt;\n&lt;p&gt;The comment component is written in Svelte. Similar to most comment systems, users must enter a nickname and email address (for notifications) to post comments. They may optionally provide a website URL.&lt;/p&gt;\n&lt;h2 id=\&quot;custom-frontend\&quot;&gt;Custom Frontend&lt;/h2&gt;\n&lt;p&gt;If you need to use the comment feature in other projects, you can directly import it via CDN. The usage method is as follows. For details, please refer to the repository &lt;a href=\&quot;https://github.com/Motues/Momo-Backend\&quot;&gt;Momo-backend&lt;/a&gt;.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;html\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&amp;#x3C;&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;div&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt; id&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;=&lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;\&quot;momo-comment\&quot;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&gt;&amp;#x3C;/&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;div&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&amp;#x3C;&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;script&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt; src&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;=&lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;\&quot;https://cdn.jsdelivr.net/npm/@motues/momo-comment/dist/momo-comment.min.js\&quot;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&gt;&amp;#x3C;/&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;script&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&amp;#x3C;&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;script&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;    momo&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;.&lt;/span&gt;&lt;span style=\&quot;color:#61AFEF\&quot;&gt;init&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;({&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;        el&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;&#39;#momo-comment&#39;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;, &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;// Comment container ID&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;        title&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;&#39;Test&#39;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;, &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;// Article title&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;        slugId&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;&#39;blog/test&#39;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;, &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;// Unique slugId of the article&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;        lang&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;&#39;zh-cn&#39;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;, &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;// Language, currently supports zh-cn, en&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;        apiUrl&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;&#39;https://api-momo.motues.top&#39;&lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt; // Backend address&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;    });&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&amp;#x3C;/&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;script&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;&gt;&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;blockquote&gt;\n&lt;p&gt;We recommend using version numbers to lock the version to avoid conflicts caused by updates.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;The comment system also provides a backend management interface supporting comment moderation and deletion.&lt;/p&gt;\n&lt;h2 id=\&quot;custom-styles\&quot;&gt;Custom Styles&lt;/h2&gt;\n&lt;p&gt;Currently, you can modify the colors of the comment component; custom style features will be released in the future. Colors are modified by setting global variables, and dark mode is supported.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;css\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#56B6C2\&quot;&gt;:root&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; {&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-text-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#d51111&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;            &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;/* Text color */&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-button-border-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#e5e5e5&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;   &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;/* Button border color */&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-button-hover-bg-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#f5f5f5&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;; &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;/* Button background color (hover state) */&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-link-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#003b6e&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;            &lt;/span&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;/* Link color */&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;}&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#7F848E;font-style:italic\&quot;&gt;/* Dark mode */&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;[&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;data-theme&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;=&lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;“dark”&lt;/span&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;]&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; { &lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;    - -momo-text-color: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#3ad8d8&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-button-border-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#2e2e2e&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-button-hover-bg-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#3c3c3c&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;    --momo-link-color&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;#fff&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;}&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;configuration&quot;],&quot;text&quot;:[0,&quot;Configuration&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;operation&quot;],&quot;text&quot;:[0,&quot;Operation&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;custom-frontend&quot;],&quot;text&quot;:[0,&quot;Custom Frontend&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;custom-styles&quot;],&quot;text&quot;:[0,&quot;Custom Styles&quot;]}]]],&quot;localImagePaths&quot;:[1,[]],&quot;remoteImagePaths&quot;:[1,[]],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;Deploying a Comment System&quot;],&quot;pubDate&quot;:[3,&quot;2026-01-08T00:00:00.000Z&quot;],&quot;description&quot;:[0,&quot;Website Configuration&quot;],&quot;category&quot;:[0,&quot;Instruction&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;draft&quot;:[0,false],&quot;slugId&quot;:[0,&quot;momo/intro/comment&quot;],&quot;minutes&quot;:[0,1],&quot;words&quot;:[0,256]}],&quot;imagePaths&quot;:[1,[]]}]}],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;isFallback&quot;:[0,false]}],[0,{&quot;id&quot;:[0,&quot;intro/publish-blog&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Article Publishing Guide&quot;],&quot;pubDate&quot;:[3,&quot;2025-09-29T00:00:00.000Z&quot;],&quot;draft&quot;:[0,false],&quot;description&quot;:[0,&quot;Website Configuration&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;slugId&quot;:[0,&quot;momo/intro/publish&quot;],&quot;category&quot;:[0,&quot;Instruction&quot;]}],&quot;body&quot;:[0,&quot;## Creating Article Files\n\nFirst, create a new folder under the `src/content/blog/` directory. You can create it directly within this directory or nest it within subdirectories.\n\nFor example, create a folder named `src/content/blog/my-first-post/`, or create `src/content/blog/posts/my-first-post/` within a subdirectory. Your article will be published to the corresponding route based on the file&#39;s relative path (relative to `src/content/`), such as `/blog/my-first-post`.\n\nFor internationalization, use `&lt;language&gt;.md` naming conventions to distinguish articles in different languages. For example, `src/content/blog/my-first-post/zh-cn.md` and `src/content/blog/my-first-post/en.md` represent the Chinese and English versions of an article, respectively.\n\n:::important\n* A default language version must exist. When generating pages, if a language version is missing for the current article, the default language version will be used as the article content.\n* The languages used must be configured in `astro.config.mjs`.\n:::\n\n## Writing Article Metadata\n\nEach article requires a metadata section (frontmatter) using YAML format, enclosed by `---` as shown below:\n\n```yaml\n---\ntitle: Article Title\npubDate: 2025-01-01\ndescription: Brief article description\ncategory: Category\nimage: \&quot;\&quot;\ndraft: false\nslugId: intro/publish\n---\n```\n\n| Name | Function | \n| :--- | :--- | \n| `title` | Article title | \n| `pubDate` | Publication date, formatted as `YYYY-MM-DD` |\n| `description` | Article description |\n| `category` | Article category, if undefined, the article will be categorized as `Uncategorized` |\n| `image` | Cover image, using relative paths relative to the current file, e.g., `./images/cover.png` |\n| `draft` | Draft status; articles in draft mode won&#39;t appear on the blog homepage when published |\n| `slugId` | Article ID, used for generating routes. Each article must be unique. It is recommended to use article paths, such as `intro/publish`. |\n\n## Writing Article Content\n\nArticle content can be written using Markdown format, supporting specific syntax. Refer to other sample articles for details.\n\n## Special Pages\n\nFor example, the About page is stored in the `src/content/spec/about/` folder. Similar to articles, it supports multiple languages and is written in Markdown. It will be rendered according to Markdown formatting and published to the `/about` route.&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/intro/publish-blog/en.md&quot;],&quot;digest&quot;:[0,&quot;b0f06e8badc362b7&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;h2 id=\&quot;creating-article-files\&quot;&gt;Creating Article Files&lt;/h2&gt;\n&lt;p&gt;First, create a new folder under the &lt;code&gt;src/content/blog/&lt;/code&gt; directory. You can create it directly within this directory or nest it within subdirectories.&lt;/p&gt;\n&lt;p&gt;For example, create a folder named &lt;code&gt;src/content/blog/my-first-post/&lt;/code&gt;, or create &lt;code&gt;src/content/blog/posts/my-first-post/&lt;/code&gt; within a subdirectory. Your article will be published to the corresponding route based on the file’s relative path (relative to &lt;code&gt;src/content/&lt;/code&gt;), such as &lt;code&gt;/blog/my-first-post&lt;/code&gt;.&lt;/p&gt;\n&lt;p&gt;For internationalization, use &lt;code&gt;&amp;#x3C;language&gt;.md&lt;/code&gt; naming conventions to distinguish articles in different languages. For example, &lt;code&gt;src/content/blog/my-first-post/zh-cn.md&lt;/code&gt; and &lt;code&gt;src/content/blog/my-first-post/en.md&lt;/code&gt; represent the Chinese and English versions of an article, respectively.&lt;/p&gt;\n&lt;div class=\&quot;important\&quot;&gt;&lt;span class=\&quot;admonition-title\&quot;&gt;IMPORTANT&lt;/span&gt;&lt;ul&gt;\n&lt;li&gt;A default language version must exist. When generating pages, if a language version is missing for the current article, the default language version will be used as the article content.&lt;/li&gt;\n&lt;li&gt;The languages used must be configured in &lt;code&gt;astro.config.mjs&lt;/code&gt;.&lt;/li&gt;\n&lt;/ul&gt;&lt;/div&gt;\n&lt;h2 id=\&quot;writing-article-metadata\&quot;&gt;Writing Article Metadata&lt;/h2&gt;\n&lt;p&gt;Each article requires a metadata section (frontmatter) using YAML format, enclosed by &lt;code&gt;---&lt;/code&gt; as shown below:&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;yaml\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;---&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;title&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;Article Title&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;pubDate&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;2025-01-01&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;description&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;Brief article description&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;category&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;Category&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;image&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;\&quot;\&quot;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;draft&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;false&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;slugId&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;: &lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;intro/publish&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;---&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th align=\&quot;left\&quot;&gt;Name&lt;/th&gt;&lt;th align=\&quot;left\&quot;&gt;Function&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;title&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;Article title&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;pubDate&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;Publication date, formatted as &lt;code&gt;YYYY-MM-DD&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;description&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;Article description&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;category&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;Article category, if undefined, the article will be categorized as &lt;code&gt;Uncategorized&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;image&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;Cover image, using relative paths relative to the current file, e.g., &lt;code&gt;./images/cover.png&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;draft&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;Draft status; articles in draft mode won’t appear on the blog homepage when published&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;&lt;code&gt;slugId&lt;/code&gt;&lt;/td&gt;&lt;td align=\&quot;left\&quot;&gt;Article ID, used for generating routes. Each article must be unique. It is recommended to use article paths, such as &lt;code&gt;intro/publish&lt;/code&gt;.&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;\n&lt;h2 id=\&quot;writing-article-content\&quot;&gt;Writing Article Content&lt;/h2&gt;\n&lt;p&gt;Article content can be written using Markdown format, supporting specific syntax. Refer to other sample articles for details.&lt;/p&gt;\n&lt;h2 id=\&quot;special-pages\&quot;&gt;Special Pages&lt;/h2&gt;\n&lt;p&gt;For example, the About page is stored in the &lt;code&gt;src/content/spec/about/&lt;/code&gt; folder. Similar to articles, it supports multiple languages and is written in Markdown. It will be rendered according to Markdown formatting and published to the &lt;code&gt;/about&lt;/code&gt; route.&lt;/p&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;creating-article-files&quot;],&quot;text&quot;:[0,&quot;Creating Article Files&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;writing-article-metadata&quot;],&quot;text&quot;:[0,&quot;Writing Article Metadata&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;writing-article-content&quot;],&quot;text&quot;:[0,&quot;Writing Article Content&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;special-pages&quot;],&quot;text&quot;:[0,&quot;Special Pages&quot;]}]]],&quot;localImagePaths&quot;:[1,[]],&quot;remoteImagePaths&quot;:[1,[]],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;Article Publishing Guide&quot;],&quot;pubDate&quot;:[3,&quot;2025-09-29T00:00:00.000Z&quot;],&quot;description&quot;:[0,&quot;Website Configuration&quot;],&quot;category&quot;:[0,&quot;Instruction&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;draft&quot;:[0,false],&quot;slugId&quot;:[0,&quot;momo/intro/publish&quot;],&quot;minutes&quot;:[0,1],&quot;words&quot;:[0,270]}],&quot;imagePaths&quot;:[1,[]]}]}],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;isFallback&quot;:[0,false]}],[0,{&quot;id&quot;:[0,&quot;intro/config&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Momo Configuration Guide&quot;],&quot;pubDate&quot;:[3,&quot;2025-09-28T00:00:00.000Z&quot;],&quot;draft&quot;:[0,false],&quot;description&quot;:[0,&quot;Website Configuration&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;slugId&quot;:[0,&quot;momo/intro/config&quot;],&quot;category&quot;:[0,&quot;Instruction&quot;]}],&quot;body&quot;:[0,&quot;## Website Information Configuration\n\nThe primary configuration files for the website are `astro.config.mjs` and `src/config.ts`\n\n### `astro.config.mjs`\n\n* `site`: Website URL\n* `i18n`: Internationalization configuration\n    * `locale`: Supported languages\n    * `defaultLocale`: Default language\n* `markdown`\n    * `shikiConfig`: Code block styling. Refer to Astro&#39;s documentation [Shiki](https://docs.astro.build/en/guides/syntax-highlighting/#setting-a-default-shiki-theme)\n\n### `src/config.ts`\n\n#### `siteConfig`\n\n* `title`: Site title\n* `subTitle`: Site subtitle\n* `favicon`: Site icon\n* `pageSize`: Number of articles per page\n* `toc`\n    * `enable`: Enable table of contents\n    * `depth`: Table of contents depth\n* `comments`\n    * `enable`: Enable comment feature\n    * `backendUrl`： Url of the backend\n\n:::tip\nFor the backend project, refer to [Momo-backend](https://github.com/Motues/Momo-Backend). Ensure all configurations are completed as specified, particularly for cross-domain domains.\n:::\n\n#### `profileConfig`\n\n* `avatar`: Profile picture\n* `name`: Name\n* `description`: Description\n* `indexpage`: Profile homepage\n\n#### `licenseConfig`\n\n* `enable`: Enable license display at the end of articles\n* `name`: License name\n* `url`: License URL\n\n#### `friendLinkConfig`\n\n* `name`: Friend link name\n* `avatar`: Friend link icon\n* `url`: Friend link URL\n* `description`: Friend link description\n\n## Internationalization Configuration\n\nInternationalization configuration files are located in the `src/i18n/` folder.\n\nTo modify the cover content for the homepage or other pages, edit the corresponding files within the `src/i18n/language` folder. Simply modify the `cover.title` and `cover.subtitle` fields as needed.&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/intro/config/en.md&quot;],&quot;digest&quot;:[0,&quot;543915620cca08ab&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;h2 id=\&quot;website-information-configuration\&quot;&gt;Website Information Configuration&lt;/h2&gt;\n&lt;p&gt;The primary configuration files for the website are &lt;code&gt;astro.config.mjs&lt;/code&gt; and &lt;code&gt;src/config.ts&lt;/code&gt;&lt;/p&gt;\n&lt;h3 id=\&quot;astroconfigmjs\&quot;&gt;&lt;code&gt;astro.config.mjs&lt;/code&gt;&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;site&lt;/code&gt;: Website URL&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;i18n&lt;/code&gt;: Internationalization configuration\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;locale&lt;/code&gt;: Supported languages&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;defaultLocale&lt;/code&gt;: Default language&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;markdown&lt;/code&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;shikiConfig&lt;/code&gt;: Code block styling. Refer to Astro’s documentation &lt;a href=\&quot;https://docs.astro.build/en/guides/syntax-highlighting/#setting-a-default-shiki-theme\&quot;&gt;Shiki&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;srcconfigts\&quot;&gt;&lt;code&gt;src/config.ts&lt;/code&gt;&lt;/h3&gt;\n&lt;h4 id=\&quot;siteconfig\&quot;&gt;&lt;code&gt;siteConfig&lt;/code&gt;&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;title&lt;/code&gt;: Site title&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;subTitle&lt;/code&gt;: Site subtitle&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;favicon&lt;/code&gt;: Site icon&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;pageSize&lt;/code&gt;: Number of articles per page&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;toc&lt;/code&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;enable&lt;/code&gt;: Enable table of contents&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;depth&lt;/code&gt;: Table of contents depth&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;comments&lt;/code&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;enable&lt;/code&gt;: Enable comment feature&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;backendUrl&lt;/code&gt;： Url of the backend&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div class=\&quot;tip\&quot;&gt;&lt;span class=\&quot;admonition-title\&quot;&gt;TIP&lt;/span&gt;&lt;p&gt;For the backend project, refer to &lt;a href=\&quot;https://github.com/Motues/Momo-Backend\&quot;&gt;Momo-backend&lt;/a&gt;. Ensure all configurations are completed as specified, particularly for cross-domain domains.&lt;/p&gt;&lt;/div&gt;\n&lt;h4 id=\&quot;profileconfig\&quot;&gt;&lt;code&gt;profileConfig&lt;/code&gt;&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;avatar&lt;/code&gt;: Profile picture&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;name&lt;/code&gt;: Name&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;description&lt;/code&gt;: Description&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;indexpage&lt;/code&gt;: Profile homepage&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4 id=\&quot;licenseconfig\&quot;&gt;&lt;code&gt;licenseConfig&lt;/code&gt;&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;enable&lt;/code&gt;: Enable license display at the end of articles&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;name&lt;/code&gt;: License name&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;url&lt;/code&gt;: License URL&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4 id=\&quot;friendlinkconfig\&quot;&gt;&lt;code&gt;friendLinkConfig&lt;/code&gt;&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;name&lt;/code&gt;: Friend link name&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;avatar&lt;/code&gt;: Friend link icon&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;url&lt;/code&gt;: Friend link URL&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;description&lt;/code&gt;: Friend link description&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&quot;internationalization-configuration\&quot;&gt;Internationalization Configuration&lt;/h2&gt;\n&lt;p&gt;Internationalization configuration files are located in the &lt;code&gt;src/i18n/&lt;/code&gt; folder.&lt;/p&gt;\n&lt;p&gt;To modify the cover content for the homepage or other pages, edit the corresponding files within the &lt;code&gt;src/i18n/language&lt;/code&gt; folder. Simply modify the &lt;code&gt;cover.title&lt;/code&gt; and &lt;code&gt;cover.subtitle&lt;/code&gt; fields as needed.&lt;/p&gt;&quot;],&quot;metadata&quot;:[0,{&quot;headings&quot;:[1,[[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;website-information-configuration&quot;],&quot;text&quot;:[0,&quot;Website Information Configuration&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;astroconfigmjs&quot;],&quot;text&quot;:[0,&quot;astro.config.mjs&quot;]}],[0,{&quot;depth&quot;:[0,3],&quot;slug&quot;:[0,&quot;srcconfigts&quot;],&quot;text&quot;:[0,&quot;src/config.ts&quot;]}],[0,{&quot;depth&quot;:[0,4],&quot;slug&quot;:[0,&quot;siteconfig&quot;],&quot;text&quot;:[0,&quot;siteConfig&quot;]}],[0,{&quot;depth&quot;:[0,4],&quot;slug&quot;:[0,&quot;profileconfig&quot;],&quot;text&quot;:[0,&quot;profileConfig&quot;]}],[0,{&quot;depth&quot;:[0,4],&quot;slug&quot;:[0,&quot;licenseconfig&quot;],&quot;text&quot;:[0,&quot;licenseConfig&quot;]}],[0,{&quot;depth&quot;:[0,4],&quot;slug&quot;:[0,&quot;friendlinkconfig&quot;],&quot;text&quot;:[0,&quot;friendLinkConfig&quot;]}],[0,{&quot;depth&quot;:[0,2],&quot;slug&quot;:[0,&quot;internationalization-configuration&quot;],&quot;text&quot;:[0,&quot;Internationalization Configuration&quot;]}]]],&quot;localImagePaths&quot;:[1,[]],&quot;remoteImagePaths&quot;:[1,[]],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;Momo Configuration Guide&quot;],&quot;pubDate&quot;:[3,&quot;2025-09-28T00:00:00.000Z&quot;],&quot;description&quot;:[0,&quot;Website Configuration&quot;],&quot;category&quot;:[0,&quot;Instruction&quot;],&quot;image&quot;:[0,&quot;&quot;],&quot;draft&quot;:[0,false],&quot;slugId&quot;:[0,&quot;momo/intro/config&quot;],&quot;minutes&quot;:[0,1],&quot;words&quot;:[0,138]}],&quot;imagePaths&quot;:[1,[]]}]}],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;isFallback&quot;:[0,false]}],[0,{&quot;id&quot;:[0,&quot;markdown&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Markdown&quot;],&quot;pubDate&quot;:[3,&quot;2025-09-21T00:00:00.000Z&quot;],&quot;draft&quot;:[0,false],&quot;description&quot;:[0,&quot;Testing basic Markdown functionality&quot;],&quot;image&quot;:[0,&quot;./cover.jpg&quot;],&quot;slugId&quot;:[0,&quot;momo/markdown&quot;]}],&quot;body&quot;:[0,&quot;## Headings\n\nTypically, use 1-6 hash symbols `#` to denote headings, for example:\n\n```markdown\n# This is a Level 1 heading\n\n## This is a Level 2 heading\n\n### This is a Level 3 heading\n\n#### This is a Level 4 heading\n\n#### This is a Level 5 heading\n```\n\nDisplayed as:\n![heading](./heading_en.png)\n\n## Paragraphs\n\n### Paragraph\n\nSeparate paragraphs with blank lines. Do not use spaces or indentation before paragraphs.\n\n```markdown\nThis is the first paragraph\n\nThis is the second paragraph\n```\n\n### Line Breaks\n\nAdd two or more spaces at the end of a line to force a line break.\n\n```markdown\nThis is the first line  \nThis is the second line\n```\n\n## Emphasis\n\n### Bold\n\nEnclose words or phrases with two asterisks `**` or underscores `__` to make them bold.\n\n```markdown\nI like **listening to music**, **traveling**...\n```\n\nDisplays as:  \nI like **listening to music**, **traveling**...\n\n### Italics\n\nEnclose words or phrases with one asterisk `*` or underscore `_` for italics.\n\n```markdown\nI like *listening to music*, _traveling_...\n```\n\nDisplays as:  \nI like *listening to music*, _traveling_...\n\n### Bold and Italic\n\nEnclose words or phrases with three asterisks `***` or three underscores `___` to apply both bold and italic formatting.\n\n```markdown\nI love **_listening to music_**, **_traveling_**...\n```\n\nDisplayed as:  \nI love **_listening to music_**, **_traveling_**...\n\n## Block Quotes\n\n### Block Quotes\n\nPrecede words or phrases with a right arrow `&gt;` to create block quotes, ensuring they are separated by spaces.\n\n```markdown\n&gt; What you dwell on will echo back!\n```\n\nDisplays as:\n\n&gt; What you dwell on will echo back!\n\n### Nested Block Quotes\n\nPrecede paragraphs with double right arrows `&gt;&gt;` to create nested quotes.\n\n```markdown\n&gt; What you dwell on\n&gt;\n&gt; &gt; will resonate\n```\n\nDisplays as:\n\n&gt; What you dwell on\n&gt;\n&gt; &gt; will resonate\n\n## Code\n\n### Code\n\nEnclose words or phrases with backticks ` to denote code.\n\n```\nIn C++, use `cout` to print Hello World!\n```\n\nDisplays as:  \nIn C++, use `cout` to print Hello World!\n\n### Code Blocks\n\nEnclose code blocks with three backticks (``) or three tilde symbols (~~~) on both sides, and specify the language type after the first line for syntax highlighting.\n\n````\n```c++\n#include &lt;iostream&gt;\nusing namespace std;\n\nint main() {\n  cout&lt;&lt;“Hello World!”&lt;&lt;endl;\n  return 0;\n}\n```\n````\n\nResult as shown below\n\n```cpp\n#include &lt;iostream&gt;\nusing namespace std;\n\nint main() {\n  cout&lt;&lt;“Hello World!”&lt;&lt;endl;\n  return 0;\n}\n```\n\n## Lists\n\n### Ordered Lists\n\nPrecede paragraphs with a number followed by a period `.` to create an ordered list. Numbers don&#39;t need to be sequential, but the list will display with numbers at the beginning.\n\n```markdown\n1. First item\n1. Second item\n1. Third item\n```\n\nDisplayed as:\n\n1. First item\n2. Second item\n3. Third item\n\n### Unordered Lists\n\nPrecede a paragraph with an asterisk `*`, hyphen `-`, or period `.` to create an unordered list.\n\n```markdown\n- First item\n\n* Second item\n  . Third item\n```\n\nDisplays as:\n\n- First item\n- Second item\n- Third item\n\n### Nesting List Items\n\nTo nest another element (paragraph, blockquote, etc.) within a list item, indent it by four spaces or one tab.\n\n```markdown\n1. First item\n   &gt; Early to bed, early to rise\n2. Second item\n```\n\nDisplays as:\n\n1. First item\n   &gt; Early to bed, early to rise\n2. Second item\n\n## Links\n\n### Linking\n\nEnclose text in square brackets (e.g., [Motues]), then add the URL in parentheses to create a link.\n\n```markdown\nWelcome to Motues&#39; [Blog](https://motues.top)!\n```\n\nDisplays as:  \nWelcome to Motues&#39; [Blog](https://motues.top)!\n\n### Link Titles\n\nAdd a title in the brackets after the URL. This will display as a tooltip when users hover over the link.\n\n```markdown\nWelcome to Motues&#39; [Blog](https://motues.top “Motues&#39; Blog”)!\n```\n\nDisplayed as:  \nWelcome to Motues&#39; [Blog](https://motues.top “Motues&#39; Blog”)!\n\n## Images\n\nStart with an exclamation mark (!), then add alternative text in parentheses. Include the image resource path or URL within the parentheses. Optionally, add a title after the URL in the parentheses.The title will be displayed below the image.\n\n```markdown\n![Motues](./Motues.png \&quot;This is my avatar\&quot;)\n```\n\nDisplayed as:  \n![Motues](./Motues.png \&quot;This is my avatar\&quot;)\n&lt;!-- &lt;img src=\&quot;./Motues.png\&quot; alt=\&quot;Motues\&quot; title=\&quot;This is my avatar\&quot; width=\&quot;256\&quot; height=\&quot;256\&quot;&gt; --&gt;\n\n## Tables\n\n### Table\n\nTo add a table, use three or more hyphens (`---`) to create each column header, and separate columns with vertical bars (`|`) (rows and columns do not need to be aligned).\n\n```markdown\n| Fruit      | Color    | Taste      |\n| ------ | ---- | ---- |\n| Watermelon🍉 | Green | Sweet  |\n| Grapes🍇 | Purple | Tart  |\n```\n\nDisplayed as:\n| Fruit      | Color      | Taste      |\n| ---------- | ---------| ----|\n| Watermelon🍉 | Green | Sweet |\n| Grapes🍇 | Purple | Tart |\n\n### Alignment\n\nYou can align text within a column to the left, right, or center by adding a colon `:` to the left, right, or both sides of the hyphen in the header row.\n\n```markdown\n| Fruit   | Color | Taste |\n| :----- | :--: | ---: |\n| Watermelon🍉 | Green | Sweet |\n| Grapes🍇 | Purple | Tart |\n```\n\nDisplayed as:\n| Fruit | Color | Taste |\n| :------ | :-----:| ----:|\n| Watermelon🍉 | Green | Sweet |\n| Grapes🍇 | Purple | Tart |\n\n### Escape Characters\n\nUse the HTML character code `&amp;#124;` to display the vertical bar `|` character in tables.\n\n## Task Lists\n\nPrecede each task item with a hyphen `-` and square brackets `[]`, inserting a space between them. To mark a task as completed, add an `x` inside the brackets.\n\n```markdown\n- [x] Eat\n- [ ] Sleep\n- [ ] Play Beans\n```\n\n- [x] Eat\n- [ ] Sleep\n- [ ] Play Beans\n\n## Other Features\n\n### Strikethrough\n\nEnclose words or phrases with two tildes `~~` to create a strikethrough.\n\n```markdown\nI don&#39;t like eating ~~grapes~~\n```\n\nDisplays as:  \nI don&#39;t like eating ~~grapes~~\n\n### Horizontal Lines\n\nUse three or more asterisks (`***`), hyphens (`---`), or underscores (`___`) on a line to create a horizontal line.\n\n```markdown\n---\n---\n\n---\n```\n\nDisplays as:\n\n---\n\n---\n\n---\n\n\nTranslated with DeepL.com (free version)&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/markdown/en.md&quot;],&quot;assetImports&quot;:[1,[[0,&quot;./heading_en.png&quot;],[0,&quot;./Motues.png&quot;]]],&quot;digest&quot;:[0,&quot;0b8a3a34cadee717&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;h2 id=\&quot;headings\&quot;&gt;Headings&lt;/h2&gt;\n&lt;p&gt;Typically, use 1-6 hash symbols &lt;code&gt;#&lt;/code&gt; to denote headings, for example:&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;# This is a Level 1 heading&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;## This is a Level 2 heading&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;### This is a Level 3 heading&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;#### This is a Level 4 heading&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;#### This is a Level 5 heading&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displayed as:\n&lt;/p&gt;&lt;figure style=\&quot;text-align: center;\&quot;&gt;&lt;img __ASTRO_IMAGE_=\&quot;{&amp;#x22;src&amp;#x22;:&amp;#x22;./heading_en.png&amp;#x22;,&amp;#x22;alt&amp;#x22;:&amp;#x22;heading&amp;#x22;,&amp;#x22;index&amp;#x22;:0}\&quot;&gt;&lt;/figure&gt;&lt;p&gt;&lt;/p&gt;\n&lt;h2 id=\&quot;paragraphs\&quot;&gt;Paragraphs&lt;/h2&gt;\n&lt;h3 id=\&quot;paragraph\&quot;&gt;Paragraph&lt;/h3&gt;\n&lt;p&gt;Separate paragraphs with blank lines. Do not use spaces or indentation before paragraphs.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;This is the first paragraph&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;This is the second paragraph&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&quot;line-breaks\&quot;&gt;Line Breaks&lt;/h3&gt;\n&lt;p&gt;Add two or more spaces at the end of a line to force a line break.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;This is the first line  &lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;This is the second line&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&quot;emphasis\&quot;&gt;Emphasis&lt;/h2&gt;\n&lt;h3 id=\&quot;bold\&quot;&gt;Bold&lt;/h3&gt;\n&lt;p&gt;Enclose words or phrases with two asterisks &lt;code&gt;**&lt;/code&gt; or underscores &lt;code&gt;__&lt;/code&gt; to make them bold.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;I like &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;**listening to music**&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;, &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;**traveling**&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;...&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displays as:&lt;br&gt;\nI like &lt;strong&gt;listening to music&lt;/strong&gt;, &lt;strong&gt;traveling&lt;/strong&gt;…&lt;/p&gt;\n&lt;h3 id=\&quot;italics\&quot;&gt;Italics&lt;/h3&gt;\n&lt;p&gt;Enclose words or phrases with one asterisk &lt;code&gt;*&lt;/code&gt; or underscore &lt;code&gt;_&lt;/code&gt; for italics.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;I like &lt;/span&gt;&lt;span style=\&quot;color:#C678DD;font-style:italic\&quot;&gt;*listening to music*&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;, &lt;/span&gt;&lt;span style=\&quot;color:#C678DD;font-style:italic\&quot;&gt;_traveling_&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;...&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displays as:&lt;br&gt;\nI like &lt;em&gt;listening to music&lt;/em&gt;, &lt;em&gt;traveling&lt;/em&gt;…&lt;/p&gt;\n&lt;h3 id=\&quot;bold-and-italic\&quot;&gt;Bold and Italic&lt;/h3&gt;\n&lt;p&gt;Enclose words or phrases with three asterisks &lt;code&gt;***&lt;/code&gt; or three underscores &lt;code&gt;___&lt;/code&gt; to apply both bold and italic formatting.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;I love &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;**&lt;/span&gt;&lt;span style=\&quot;color:#C678DD;font-style:italic\&quot;&gt;_listening to music_&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;**&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;, &lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;**&lt;/span&gt;&lt;span style=\&quot;color:#C678DD;font-style:italic\&quot;&gt;_traveling_&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt;**&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;...&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displayed as:&lt;br&gt;\nI love &lt;strong&gt;&lt;em&gt;listening to music&lt;/em&gt;&lt;/strong&gt;, &lt;strong&gt;&lt;em&gt;traveling&lt;/em&gt;&lt;/strong&gt;…&lt;/p&gt;\n&lt;h2 id=\&quot;block-quotes\&quot;&gt;Block Quotes&lt;/h2&gt;\n&lt;h3 id=\&quot;block-quotes-1\&quot;&gt;Block Quotes&lt;/h3&gt;\n&lt;p&gt;Precede words or phrases with a right arrow &lt;code&gt;&gt;&lt;/code&gt; to create block quotes, ensuring they are separated by spaces.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#5C6370\&quot;&gt;&gt; What you dwell on will echo back!&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displays as:&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;What you dwell on will echo back!&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\&quot;nested-block-quotes\&quot;&gt;Nested Block Quotes&lt;/h3&gt;\n&lt;p&gt;Precede paragraphs with double right arrows &lt;code&gt;&gt;&gt;&lt;/code&gt; to create nested quotes.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#5C6370\&quot;&gt;&gt; What you dwell on&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#5C6370\&quot;&gt;&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#5C6370\&quot;&gt;&gt; &gt; will resonate&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displays as:&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;What you dwell on&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;will resonate&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\&quot;code\&quot;&gt;Code&lt;/h2&gt;\n&lt;h3 id=\&quot;code-1\&quot;&gt;Code&lt;/h3&gt;\n&lt;p&gt;Enclose words or phrases with backticks ` to denote code.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;plaintext\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;In C++, use `cout` to print Hello World!&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displays as:&lt;br&gt;\nIn C++, use &lt;code&gt;cout&lt;/code&gt; to print Hello World!&lt;/p&gt;\n&lt;h3 id=\&quot;code-blocks\&quot;&gt;Code Blocks&lt;/h3&gt;\n&lt;p&gt;Enclose code blocks with three backticks (“) or three tilde symbols (~~~) on both sides, and specify the language type after the first line for syntax highlighting.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;plaintext\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;```c++&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;#include &amp;#x3C;iostream&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;using namespace std;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;int main() {&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;  cout&amp;#x3C;&amp;#x3C;“Hello World!”&amp;#x3C;&amp;#x3C;endl;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;  return 0;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;}&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span&gt;```&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Result as shown below&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;cpp\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;#include&lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt; &amp;#x3C;iostream&gt;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;using&lt;/span&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt; namespace&lt;/span&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt; std&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;int&lt;/span&gt;&lt;span style=\&quot;color:#61AFEF\&quot;&gt; main&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;() {&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;  cout&lt;/span&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;&amp;#x3C;&amp;#x3C;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;“Hello World&lt;/span&gt;&lt;span style=\&quot;color:#56B6C2\&quot;&gt;!&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;”&lt;/span&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;&amp;#x3C;&amp;#x3C;&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;endl;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#C678DD\&quot;&gt;  return&lt;/span&gt;&lt;span style=\&quot;color:#D19A66\&quot;&gt; 0&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;;&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;}&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&quot;lists\&quot;&gt;Lists&lt;/h2&gt;\n&lt;h3 id=\&quot;ordered-lists\&quot;&gt;Ordered Lists&lt;/h3&gt;\n&lt;p&gt;Precede paragraphs with a number followed by a period &lt;code&gt;.&lt;/code&gt; to create an ordered list. Numbers don’t need to be sequential, but the list will display with numbers at the beginning.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;1.&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; First item&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;1.&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; Second item&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;1.&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; Third item&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displayed as:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;First item&lt;/li&gt;\n&lt;li&gt;Second item&lt;/li&gt;\n&lt;li&gt;Third item&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3 id=\&quot;unordered-lists\&quot;&gt;Unordered Lists&lt;/h3&gt;\n&lt;p&gt;Precede a paragraph with an asterisk &lt;code&gt;*&lt;/code&gt;, hyphen &lt;code&gt;-&lt;/code&gt;, or period &lt;code&gt;.&lt;/code&gt; to create an unordered list.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;-&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; First item&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;*&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; Second item&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;  . Third item&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displays as:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;First item&lt;/li&gt;\n&lt;li&gt;Second item&lt;/li&gt;\n&lt;li&gt;Third item&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&quot;nesting-list-items\&quot;&gt;Nesting List Items&lt;/h3&gt;\n&lt;p&gt;To nest another element (paragraph, blockquote, etc.) within a list item, indent it by four spaces or one tab.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;1.&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; First item&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#5C6370\&quot;&gt;   &gt; Early to bed, early to rise&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;2.&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; Second item&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displays as:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;First item\n&lt;blockquote&gt;\n&lt;p&gt;Early to bed, early to rise&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/li&gt;\n&lt;li&gt;Second item&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\&quot;links\&quot;&gt;Links&lt;/h2&gt;\n&lt;h3 id=\&quot;linking\&quot;&gt;Linking&lt;/h3&gt;\n&lt;p&gt;Enclose text in square brackets (e.g., [Motues]), then add the URL in parentheses to create a link.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;Welcome to Motues&#39; [&lt;/span&gt;&lt;span style=\&quot;color:#61AFEF\&quot;&gt;Blog&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;]&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;(&lt;/span&gt;&lt;span style=\&quot;color:#C678DD;text-decoration:underline\&quot;&gt;https://motues.top&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;)&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;!&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displays as:&lt;br&gt;\nWelcome to Motues’ &lt;a href=\&quot;https://motues.top\&quot;&gt;Blog&lt;/a&gt;!&lt;/p&gt;\n&lt;h3 id=\&quot;link-titles\&quot;&gt;Link Titles&lt;/h3&gt;\n&lt;p&gt;Add a title in the brackets after the URL. This will display as a tooltip when users hover over the link.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;Welcome to Motues&#39; [&lt;/span&gt;&lt;span style=\&quot;color:#61AFEF\&quot;&gt;Blog&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;](https://motues.top “Motues&#39; Blog”)!&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displayed as:&lt;br&gt;\nWelcome to Motues’ [Blog](&lt;a href=\&quot;https://motues.top\&quot;&gt;https://motues.top&lt;/a&gt; “Motues’ Blog”)!&lt;/p&gt;\n&lt;h2 id=\&quot;images\&quot;&gt;Images&lt;/h2&gt;\n&lt;p&gt;Start with an exclamation mark (!), then add alternative text in parentheses. Include the image resource path or URL within the parentheses. Optionally, add a title after the URL in the parentheses.The title will be displayed below the image.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;![&lt;/span&gt;&lt;span style=\&quot;color:#61AFEF\&quot;&gt;Motues&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;]&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;(&lt;/span&gt;&lt;span style=\&quot;color:#C678DD;text-decoration:underline\&quot;&gt;./Motues.png&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt; \&quot;&lt;/span&gt;&lt;span style=\&quot;color:#98C379\&quot;&gt;This is my avatar&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;\&quot;&lt;/span&gt;&lt;span style=\&quot;color:#E06C75\&quot;&gt;)&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displayed as:&lt;br&gt;\n&lt;/p&gt;&lt;figure style=\&quot;text-align: center;\&quot;&gt;&lt;img __ASTRO_IMAGE_=\&quot;{&amp;#x22;src&amp;#x22;:&amp;#x22;./Motues.png&amp;#x22;,&amp;#x22;alt&amp;#x22;:&amp;#x22;Motues&amp;#x22;,&amp;#x22;title&amp;#x22;:&amp;#x22;This is my avatar&amp;#x22;,&amp;#x22;index&amp;#x22;:0}\&quot;&gt;&lt;figcaption class=\&quot;text-center text-sm text-[var(--text-color-70)]\&quot;&gt;This is my avatar&lt;/figcaption&gt;&lt;/figure&gt;&lt;p&gt;&lt;/p&gt;\n&lt;!-- &lt;img src=\&quot;./Motues.png\&quot; alt=\&quot;Motues\&quot; title=\&quot;This is my avatar\&quot; width=\&quot;256\&quot; height=\&quot;256\&quot;&gt; --&gt;\n&lt;h2 id=\&quot;tables\&quot;&gt;Tables&lt;/h2&gt;\n&lt;h3 id=\&quot;table\&quot;&gt;Table&lt;/h3&gt;\n&lt;p&gt;To add a table, use three or more hyphens (&lt;code&gt;---&lt;/code&gt;) to create each column header, and separate columns with vertical bars (&lt;code&gt;|&lt;/code&gt;) (rows and columns do not need to be aligned).&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| Fruit      | Color    | Taste      |&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| ------ | ---- | ---- |&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| Watermelon🍉 | Green | Sweet  |&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| Grapes🍇 | Purple | Tart  |&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displayed as:&lt;/p&gt;\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Fruit&lt;/th&gt;&lt;th&gt;Color&lt;/th&gt;&lt;th&gt;Taste&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&lt;tr&gt;&lt;td&gt;Watermelon🍉&lt;/td&gt;&lt;td&gt;Green&lt;/td&gt;&lt;td&gt;Sweet&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;Grapes🍇&lt;/td&gt;&lt;td&gt;Purple&lt;/td&gt;&lt;td&gt;Tart&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;\n&lt;h3 id=\&quot;alignment\&quot;&gt;Alignment&lt;/h3&gt;\n&lt;p&gt;You can align text within a column to the left, right, or center by adding a colon &lt;code&gt;:&lt;/code&gt; to the left, right, or both sides of the hyphen in the header row.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| Fruit   | Color | Taste |&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| :----- | :--: | ---: |&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| Watermelon🍉 | Green | Sweet |&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;| Grapes🍇 | Purple | Tart |&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Displayed as:&lt;/p&gt;\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th align=\&quot;left\&quot;&gt;Fruit&lt;/th&gt;&lt;th align=\&quot;center\&quot;&gt;Color&lt;/th&gt;&lt;th align=\&quot;right\&quot;&gt;Taste&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;Watermelon🍉&lt;/td&gt;&lt;td align=\&quot;center\&quot;&gt;Green&lt;/td&gt;&lt;td align=\&quot;right\&quot;&gt;Sweet&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td align=\&quot;left\&quot;&gt;Grapes🍇&lt;/td&gt;&lt;td align=\&quot;center\&quot;&gt;Purple&lt;/td&gt;&lt;td align=\&quot;right\&quot;&gt;Tart&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;\n&lt;h3 id=\&quot;escape-characters\&quot;&gt;Escape Characters&lt;/h3&gt;\n&lt;p&gt;Use the HTML character code &lt;code&gt;&amp;#x26;#124;&lt;/code&gt; to display the vertical bar &lt;code&gt;|&lt;/code&gt; character in tables.&lt;/p&gt;\n&lt;h2 id=\&quot;task-lists\&quot;&gt;Task Lists&lt;/h2&gt;\n&lt;p&gt;Precede each task item with a hyphen &lt;code&gt;-&lt;/code&gt; and square brackets &lt;code&gt;[]&lt;/code&gt;, inserting a space between them. To mark a task as completed, add an &lt;code&gt;x&lt;/code&gt; inside the brackets.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&quot; tabindex=\&quot;0\&quot; data-language=\&quot;markdown\&quot;&gt;&lt;code&gt;&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;-&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; [&lt;/span&gt;&lt;span style=\&quot;color:#61AFEF\&quot;&gt;x&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt;] Eat&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;-&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; [ ] Sleep&lt;/span&gt;&lt;/span&gt;\n&lt;span class=\&quot;line\&quot;&gt;&lt;span style=\&quot;color:#E5C07B\&quot;&gt;-&lt;/span&gt;&lt;span style=\&quot;color:#ABB2BF\&quot;&gt; [ ] Play Beans&lt;/span&gt;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;\n&lt;ul class=\&quot;contains-task-list\&quot;&gt;\n&lt;li class=\&quot;task-list-item\&quot;&gt;&lt;input type=\&quot;checkbox\&quot; checked disabled&gt; Eat&lt;/li&gt;\n&lt;li class=\&quot;task-list-item\&quot;&gt;&lt;input type=\&quot;checkbox\&quot; disabled&gt; Sleep&lt;/li&gt;\n&lt;li class=\&quot;task-list-item\&quot;&gt;&lt;input type=\&quot;checkbox\&quot; disabled&gt; Play Beans&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&quot;other-features\&quot;&gt;Other Features&lt;/h2&gt;\n&lt;h3 id=\&quot;strikethrough\&quot;&gt;Strikethrough&lt;/h3&gt;\n&lt;p&gt;Enclose words or phrases with two tildes &lt;code&gt;~~&lt;/code&gt; to create a strikethrough.&lt;/p&gt;\n&lt;pre class=\&quot;astro-code one-dark-pro\&quot; style=\&quot;background-color:#282c34;color:#abb2bf; overflow-x: auto;\&qu quot;:[0,&quot;momo/test/katex&quot;],&quot;category&quot;:[0,&quot;Test&quot;]}],&quot;body&quot;:[0,&quot;## KaTeX Math Formula Testing\n\n### Inline Formula Example\n\nThis is an inline formula example: $E = mc^2$, demonstrating Einstein&#39;s mass-energy equation.\n\nAnother inline formula example: $\\sum_{i=1}^{n} x_i = X$, representing the sum of n numbers.\n\n### Block-Level Formula Example\n\nBelow is a block-level formula example:\n\n$$\n\\frac{\\partial}{\\partial t}\\Psi(\\mathbf{r},t) = \\frac{i}{\\hbar}H\\Psi(\\mathbf{r},t)\n$$\n\nThis is the time-dependent form of the Schrödinger equation.\n\n### Complex Formula Example\n\n$$\n\\begin{aligned}\n\\nabla \\times \\vec{\\mathbf{B}} -\\, \\frac1c\\, \\frac{\\partial\\vec{\\mathbf{E}}}{\\partial t} &amp; = \\frac{4\\pi}{c}\\vec{\\mathbf{j}} \\\\\n\\nabla \\cdot \\vec{\\mathbf{E}} &amp; = 4 \\pi \\rho \\\\\n\\nabla \\times \\vec{\\mathbf{E}}\\, +\\, \\frac1c\\, \\frac{\\partial\\vec{\\mathbf{B}}}{\\partial t} &amp; = \\vec{\\mathbf{0}} \\\\\n\\nabla \\cdot \\vec{\\mathbf{B}} &amp; = 0\n\\end{aligned}\n$$\n\nThis is the differential form of Maxwell&#39;s equations.\n\n### Matrix Example\n\n$$\n\\begin{pmatrix}\na &amp; b &amp; c \\\\\nd &amp; e &amp; f \\\\\ng &amp; h &amp; i\n\\end{pmatrix}\n$$\n\nThis is an example of a 3x3 matrix.\n\n### Piecewise Function Example\n\n$$\nf(x) = \\begin{cases}\nx^2 &amp; \\text{if } x \\geq 0 \\\\\n-x^2 &amp; \\text{if } x &lt; 0\n\\end{cases}\n$$\n\nThis is an example of a piecewise function.\n\n### Limit Example\n\n$$\n\\lim_{x \\to 0} \\frac{\\sin(x)}{x} = 1\n$$\n\nThis is the famous limit formula.\n\n### Integral Example\n\n$$\n\\int_{-\\infty}^{\\infty} e^{-x^2} dx = \\sqrt{\\pi}\n$$\n\nThis is an example of the Gaussian integral.&quot;],&quot;filePath&quot;:[0,&quot;src/content/blog/test/katex/en.md&quot;],&quot;digest&quot;:[0,&quot;2e1da5bf843b7dea&quot;],&quot;rendered&quot;:[0,{&quot;html&quot;:[0,&quot;&lt;h2 id=\&quot;katex-math-formula-testing\&quot;&gt;KaTeX M
